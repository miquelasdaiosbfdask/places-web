<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña — Yumlist</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230e0d0c' rx='8'/><circle cx='11' cy='16' r='8' fill='%23C4622D'/><circle cx='19' cy='16' r='8' fill='%23F5F0E8' fill-opacity='0.15'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0d0c;
    color: #F5F0E8;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .logo {
    display: flex;
    justify-content: center;
    margin-bottom: 4px;
  }

  .heading {
    text-align: center;
  }

  .heading h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px;
    font-weight: 300;
    color: #F5F0E8;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .heading p {
    font-size: 14px;
    color: #B89F87;
    line-height: 1.6;
  }

  .form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(245,240,232,0.45);
  }

  input[type="password"] {
    background: rgba(245,240,232,0.06);
    border: 1px solid rgba(245,240,232,0.12);
    border-radius: 12px;
    padding: 15px 16px;
    color: #F5F0E8;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }

  input[type="password"]::placeholder {
    color: #7A756E;
  }

  input[type="password"]:focus {
    border-color: rgba(245,240,232,0.3);
  }

  .btn {
    width: 100%;
    background: #F5F0E8;
    color: #0e0d0c;
    border: none;
    border-radius: 999px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }

  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .msg {
    font-size: 13px;
    line-height: 1.5;
    text-align: center;
    display: none;
  }

  .msg.error { color: #E53935; }
  .msg.success { color: #4CAF50; }
  .msg.visible { display: block; }

  .open-app {
    display: inline-block;
    margin-top: 14px;
    background: rgba(245,240,232,0.08);
    border: 1px solid rgba(245,240,232,0.14);
    border-radius: 999px;
    padding: 12px 28px;
    color: #F5F0E8;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.2s;
  }

  .open-app:hover { background: rgba(245,240,232,0.14); }

  .success-block {
    text-align: center;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .success-block.visible { display: flex; }

  .success-block p {
    font-size: 14px;
    color: #4CAF50;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo">
    <svg width="120" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="18" r="10" fill="#C4622D"/>
      <circle cx="19" cy="18" r="10" fill="#F5F0E8" fill-opacity="0.1" stroke="#F5F0E8" stroke-width="0.8"/>
      <text x="34" y="24" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="300" letter-spacing="-1" fill="#F5F0E8">yumlist</text>
    </svg>
  </div>

  <!-- Encabezado -->
  <div class="heading">
    <h1>Nueva contraseña</h1>
    <p>Escribe tu nueva contraseña para acceder a tu cuenta.</p>
  </div>

  <!-- Mensaje de estado global (enlace inválido / caducado) -->
  <p class="msg error" id="msg-global"></p>

  <!-- Formulario -->
  <div class="form" id="form" style="display:none">
    <div class="field">
      <label for="password">Nueva contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    </div>
    <div class="field">
      <label for="password2">Repetir contraseña</label>
      <input type="password" id="password2" placeholder="Repite la contraseña" autocomplete="new-password">
    </div>

    <p class="msg error" id="msg-form"></p>

    <button class="btn" type="button" id="submit-btn">Cambiar contraseña</button>
  </div>

  <!-- Bloque de éxito -->
  <div class="success-block" id="success-block">
    <p>Contraseña cambiada correctamente.<br>Ya puedes volver a la app e iniciar sesión con tu nueva contraseña.</p>
    <a href="#" class="open-app" id="open-app-link">Abrir Yumlist</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://klkksarpfcohfqirxwoe.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsa2tzYXJwZmNvaGZxaXJ4d29lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDMwMTUsImV4cCI6MjA4OTYxOTAxNX0.ep8NgjugAIAW07qRdlM4A2ScHEHteDBaRQMOmGKPTtE';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const form        = document.getElementById('form');
  const msgGlobal   = document.getElementById('msg-global');
  const msgForm     = document.getElementById('msg-form');
  const submitBtn   = document.getElementById('submit-btn');
  const successBlock = document.getElementById('success-block');
  const openAppLink = document.getElementById('open-app-link');

  function showGlobalError(text) {
    msgGlobal.textContent = text;
    msgGlobal.classList.add('visible');
    form.style.display = 'none';
  }

  function showFormError(text) {
    msgForm.textContent = text;
    msgForm.classList.add('visible');
  }

  function clearFormError() {
    msgForm.textContent = '';
    msgForm.classList.remove('visible');
  }

  // ── Leer params del hash y de la query string ─────────────────────────────
  const hashParams  = new URLSearchParams(window.location.hash.substring(1));
  const queryParams = new URLSearchParams(window.location.search);

  const access_token  = hashParams.get('access_token')  || queryParams.get('access_token');
  const refresh_token = hashParams.get('refresh_token') || queryParams.get('refresh_token');
  const type          = hashParams.get('type')          || queryParams.get('type');
  const urlError      = hashParams.get('error')         || queryParams.get('error');

  // ── Deep link para "Abrir Yumlist" ────────────────────────────────────────
  openAppLink.addEventListener('click', function(e) {
    e.preventDefault();
    // TODO: actualizar appStoreUrl con Apple ID real cuando esté disponible en App Store Connect
    const appStoreUrl = null;
    const deepLink = 'yumlist://';
    let opened = false;
    window.addEventListener('blur', function onBlur() {
      opened = true;
      window.removeEventListener('blur', onBlur);
    });
    window.location.href = deepLink;
    setTimeout(function() {
      if (!opened && appStoreUrl) window.location.href = appStoreUrl;
    }, 1500);
  });

  // ── Inicialización ────────────────────────────────────────────────────────
  async function init() {
    if (urlError) {
      showGlobalError('Este enlace ha caducado o no es válido. Vuelve a la app y solicita uno nuevo.');
      return;
    }

    if (!access_token || !refresh_token) {
      showGlobalError('Enlace inválido. Vuelve a la app y solicita un nuevo enlace de recuperación.');
      return;
    }

    const { error: sessionError } = await sb.auth.setSession({ access_token, refresh_token });
    if (sessionError) {
      showGlobalError('Este enlace ha caducado. Vuelve a la app y solicita uno nuevo.');
      return;
    }

    // Sesión establecida: mostrar formulario
    form.style.display = 'flex';
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  submitBtn.addEventListener('click', async function() {
    clearFormError();

    const pwd  = document.getElementById('password').value;
    const pwd2 = document.getElementById('password2').value;

    if (pwd.length < 8) {
      showFormError('La contraseña debe tener al menos 8 caracteres.');
      return;
    }
    if (pwd !== pwd2) {
      showFormError('Las contraseñas no coinciden.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Guardando…';

    const { error: updateError } = await sb.auth.updateUser({ password: pwd });

    if (updateError) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Cambiar contraseña';
      showFormError('No se pudo cambiar la contraseña. Inténtalo de nuevo o solicita un nuevo enlace.');
      return;
    }

    form.style.display = 'none';
    successBlock.classList.add('visible');
  });

  init();
</script>
</body>
</html>
