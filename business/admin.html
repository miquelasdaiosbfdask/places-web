<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Yumlist Negocios</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230e0d0c' rx='8'/><circle cx='11' cy='16' r='8' fill='%23C4622D'/><circle cx='19' cy='16' r='8' fill='%23F5F0E8' fill-opacity='0.15'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="business.css">
<style>
  .admin-layout { max-width: 980px; }
  .doc-link { font-size: 12px; color: rgba(245,240,232,.5); text-decoration: none; transition: color .2s; }
  .doc-link:hover { color: var(--cream); }

  /* Section tabs */
  .admin-tabs { display: flex; gap: 0; border-bottom: 0.5px solid rgba(245,240,232,.12); margin-bottom: 24px; }
  .admin-tab {
    padding: 10px 24px; font-size: 14px; font-family: 'DM Sans', sans-serif;
    color: rgba(245,240,232,.45); background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
    margin-bottom: -0.5px;
  }
  .admin-tab:hover { color: rgba(245,240,232,.75); }
  .admin-tab.active { color: var(--cream, #F5F0E8); border-bottom-color: var(--cream, #F5F0E8); }

  /* Report cards */
  .report-card {
    background: rgba(245,240,232,.04); border: 0.5px solid rgba(245,240,232,.1);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 12px;
  }
  .report-meta { display: flex; flex-wrap: wrap; gap: 10px 20px; font-size: 12px; color: rgba(245,240,232,.45); margin-bottom: 10px; }
  .report-meta span { display: flex; align-items: center; gap: 4px; }
  .report-type { font-size: 11px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; background: rgba(245,240,232,.08); color: rgba(245,240,232,.6); }
  .report-reason { font-size: 15px; color: var(--cream, #F5F0E8); margin-bottom: 6px; font-family: 'DM Sans', sans-serif; }
  .report-desc { font-size: 13px; color: rgba(245,240,232,.5); margin-bottom: 12px; font-style: italic; }

  .badge {
    display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .4px;
    text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
  }
  .badge-pending  { background: rgba(250,200,60,.15);  color: #fac83c; border: 0.5px solid rgba(250,200,60,.3); }
  .badge-reviewed { background: rgba(80,140,255,.15);  color: #7cb4ff; border: 0.5px solid rgba(80,140,255,.3); }
  .badge-resolved { background: rgba(80,210,120,.15);  color: #50d278; border: 0.5px solid rgba(80,210,120,.3); }

  .report-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-reviewed {
    font-size: 13px; padding: 6px 16px; border-radius: 20px; border: 0.5px solid rgba(80,140,255,.5);
    background: rgba(80,140,255,.1); color: #7cb4ff; cursor: pointer; transition: background .2s;
  }
  .btn-reviewed:hover { background: rgba(80,140,255,.2); }
  .btn-resolved {
    font-size: 13px; padding: 6px 16px; border-radius: 20px; border: 0.5px solid rgba(80,210,120,.5);
    background: rgba(80,210,120,.1); color: #50d278; cursor: pointer; transition: background .2s;
  }
  .btn-resolved:hover { background: rgba(80,210,120,.2); }
  .btn-disabled { opacity: .35; cursor: default; pointer-events: none; }

  .report-status-msg { font-size: 12px; color: rgba(245,240,232,.4); }
  .report-filter-row { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 5px 14px; border-radius: 20px; cursor: pointer; transition: all .2s;
    border: 0.5px solid rgba(245,240,232,.15); background: none; color: rgba(245,240,232,.5);
  }
  .filter-btn.active, .filter-btn:hover { background: rgba(245,240,232,.08); color: rgba(245,240,232,.85); border-color: rgba(245,240,232,.25); }
  .reports-count { font-size: 12px; color: rgba(245,240,232,.35); margin-left: auto; }

  /* Users section */
  .users-section-header {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; margin-top: 32px;
  }
  .users-section-header:first-child { margin-top: 0; }
  .users-section-title {
    font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300;
    color: var(--cream, #F5F0E8); margin: 0; letter-spacing: -.3px;
  }
  .users-count {
    font-size: 12px; color: rgba(245,240,232,.35); font-family: 'DM Sans', sans-serif;
  }
  .data-table-wrap { overflow-x: auto; border-radius: 12px; border: 0.5px solid rgba(245,240,232,.1); }
  .data-table {
    width: 100%; border-collapse: collapse; font-family: 'DM Sans', sans-serif; font-size: 13px;
  }
  .data-table thead th {
    text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 500;
    letter-spacing: .5px; text-transform: uppercase; color: rgba(245,240,232,.35);
    border-bottom: 0.5px solid rgba(245,240,232,.08); white-space: nowrap;
  }
  .data-table tbody tr { border-bottom: 0.5px solid rgba(245,240,232,.06); transition: background .15s; }
  .data-table tbody tr:last-child { border-bottom: none; }
  .data-table tbody tr:hover { background: rgba(245,240,232,.03); }
  .data-table td { padding: 10px 14px; color: rgba(245,240,232,.75); vertical-align: middle; }
  .avatar-sm {
    width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
    display: block; background: rgba(245,240,232,.08);
  }
  .avatar-placeholder {
    width: 28px; height: 28px; border-radius: 50%; background: rgba(196,98,45,.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #C4622D;
  }
  .cell-username { color: var(--cream, #F5F0E8); font-weight: 500; }
  .cell-date { color: rgba(245,240,232,.35); white-space: nowrap; }
  .cell-email { color: rgba(245,240,232,.45); font-size: 12px; }
  .cell-restaurant { color: var(--cream, #F5F0E8); font-weight: 500; }

  /* Status badges for business accounts */
  .badge-status-verified { background: rgba(80,210,120,.12); color: #50d278; border: 0.5px solid rgba(80,210,120,.3); }
  .badge-status-pending  { background: rgba(250,200,60,.12); color: #fac83c; border: 0.5px solid rgba(250,200,60,.3); }
  .badge-status-rejected { background: rgba(229,57,53,.12);  color: #ef6c6a; border: 0.5px solid rgba(229,57,53,.3); }
  .badge-plan-label {
    background: rgba(245,240,232,.07); color: rgba(245,240,232,.6);
    border: 0.5px solid rgba(245,240,232,.12);
  }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; gap: 10px; padding: 14px 0 2px;
    font-family: 'DM Sans', sans-serif;
  }
  .pg-btn {
    font-size: 12px; padding: 5px 14px; border-radius: 20px; cursor: pointer;
    border: 0.5px solid rgba(245,240,232,.15); background: none;
    color: rgba(245,240,232,.6); transition: all .2s;
  }
  .pg-btn:hover:not(:disabled) { background: rgba(245,240,232,.08); color: rgba(245,240,232,.9); }
  .pg-btn:disabled { opacity: .3; cursor: default; }
  .pg-info { font-size: 12px; color: rgba(245,240,232,.35); min-width: 52px; text-align: center; }
</style>
</head>
<body>


<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div class="admin-layout">
      <div class="page-header">
        <div class="page-label">Administración</div>
        <h1 class="page-title" id="page-title">Verificaciones pendientes</h1>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchTab('verifications')">Verificaciones</button>
        <button class="admin-tab" onclick="switchTab('reports')">Reportes</button>
        <button class="admin-tab" onclick="switchTab('users')">Usuarios</button>
      </div>

      <div id="content"><div class="loading">Cargando solicitudes…</div></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="business-auth.js"></script>
<script>
let currentTab = 'verifications';
const PAGE_SIZE = 10;

// Users state
let appUsers = [], appUsersPage = 0;
let bizAccounts = [], bizAccountsPage = 0;

const REASON_LABELS = {
  spam:          'Spam o contenido repetitivo',
  inappropriate: 'Contenido inapropiado',
  fake:          'Reseña falsa o engañosa',
  harassment:    'Acoso o comportamiento abusivo',
  other:         'Otro motivo',
};

async function init() {
  const session = await requireAdmin();
  if (!session) return; // requireAdmin already handled redirect or denial screen

  document.getElementById('sidebar-mount').innerHTML = buildSidebar(
    { restaurant_name: 'Admin', status: 'verified', plan: 'premium' },
    '/business/admin'
  );

  await loadPending();
}

function switchTab(tab) {
  currentTab = tab;
  const tabOrder = ['verifications', 'reports', 'users'];
  document.querySelectorAll('.admin-tab').forEach((el, i) =>
    el.classList.toggle('active', tabOrder[i] === tab));
  const titles = {
    verifications: 'Verificaciones pendientes',
    reports: 'Reportes de usuarios',
    users: 'Usuarios',
  };
  document.getElementById('page-title').textContent = titles[tab] ?? tab;
  document.getElementById('content').innerHTML = '<div class="loading">Cargando…</div>';
  if (tab === 'verifications') loadPending();
  else if (tab === 'reports') loadReports('all');
  else loadUsers();
}

// ── Verifications ─────────────────────────────────────────────────────────────

async function loadPending() {
  const content = document.getElementById('content');

  const { data: docs, error } = await sb
    .from('business_verification_docs')
    .select('*, business_accounts(id, restaurant_name, cif, owner_name, city, status)')
    .eq('status', 'pending')
    .order('created_at', { ascending: true });

  if (error) {
    content.innerHTML = `<div class="alert alert-error">Error al cargar: ${error.message}</div>`;
    return;
  }

  if (!docs || docs.length === 0) {
    content.innerHTML = '<div class="empty">No hay solicitudes pendientes. ✓</div>';
    return;
  }

  content.innerHTML = docs.map(doc => {
    const acc = doc.business_accounts ?? {};
    return `
      <div class="verification-card" id="doc-${escHtml(doc.id)}">
        <div class="verification-name">${escHtml(acc.restaurant_name ?? '—')}</div>
        <div class="verification-meta">
          <span>CIF: ${escHtml(acc.cif ?? '—')}</span>
          <span>Titular: ${escHtml(acc.owner_name ?? '—')}</span>
          <span>Ciudad: ${escHtml(acc.city ?? '—')}</span>
          <span>Recibido: ${formatDate(doc.created_at)}</span>
        </div>
        <div style="margin-bottom:12px">
          <a href="#" class="doc-link" id="doc-link-${escHtml(doc.id)}"
            data-doc-path="${escHtml(doc.document_url)}" data-doc-id="${escHtml(doc.id)}">
            Ver documento →
          </a>
          <span id="doc-url-${escHtml(doc.id)}" style="font-size:12px;color:rgba(245,240,232,.35);margin-left:8px"></span>
        </div>
        <div class="verification-actions">
          <button class="btn-approve" data-doc-id="${escHtml(doc.id)}" data-account-id="${escHtml(acc.id)}">Aprobar</button>
          <button class="btn-reject"  data-doc-id="${escHtml(doc.id)}">Rechazar</button>
        </div>
        <div class="reject-form" id="rf-${escHtml(doc.id)}">
          <textarea class="form-input" id="rt-${escHtml(doc.id)}" placeholder="Motivo del rechazo (se enviará por email)..." style="margin-top:8px;margin-bottom:8px"></textarea>
          <button class="btn-sm btn-reject-confirm" data-doc-id="${escHtml(doc.id)}" data-account-id="${escHtml(acc.id)}">Confirmar rechazo</button>
          <div id="rm-${escHtml(doc.id)}" style="margin-top:6px;font-size:12px;color:var(--muted)"></div>
        </div>
        <div id="action-msg-${escHtml(doc.id)}" style="margin-top:10px;font-size:13px"></div>
      </div>`;
  }).join('');

  // Attach event listeners after innerHTML is set (avoids data injection in onclick)
  content.querySelectorAll('.doc-link[data-doc-path]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); getDocUrl(a.dataset.docPath, a.dataset.docId); });
  });
  content.querySelectorAll('.btn-approve[data-doc-id]').forEach(btn => {
    btn.addEventListener('click', () => approveDoc(btn.dataset.docId, btn.dataset.accountId));
  });
  content.querySelectorAll('.btn-reject[data-doc-id]').forEach(btn => {
    btn.addEventListener('click', () => toggleReject(btn.dataset.docId));
  });
  content.querySelectorAll('.btn-reject-confirm[data-doc-id]').forEach(btn => {
    btn.addEventListener('click', () => rejectDoc(btn.dataset.docId, btn.dataset.accountId));
  });
}

async function getDocUrl(path, docId) {
  const { data, error } = await sb.storage.from('business-docs').createSignedUrl(path, 3600);
  const el = document.getElementById(`doc-url-${docId}`);
  if (error || !data?.signedUrl) {
    el.textContent = 'Error al generar enlace';
    return;
  }
  window.open(data.signedUrl, '_blank');
  el.textContent = '(enlace válido 1h)';
}

async function approveDoc(docId, accountId) {
  const msg = document.getElementById(`action-msg-${docId}`);
  msg.textContent = 'Aprobando...';
  msg.style.color = 'var(--muted)';

  const { error: e1 } = await sb
    .from('business_accounts')
    .update({ status: 'verified' })
    .eq('id', accountId);

  const { error: e2 } = await sb
    .from('business_verification_docs')
    .update({ status: 'verified' })
    .eq('id', docId);

  if (e1 || e2) {
    msg.textContent = 'Error al aprobar. Revisa la consola.';
    msg.style.color = 'var(--clay)';
    console.error(e1, e2);
    return;
  }

  const { data: bizData } = await sb.from('business_accounts').select('email').eq('id', accountId).maybeSingle();
  const email = bizData?.email ?? null;

  if (email) {
    await sendEmailNotification(
      email,
      '✓ Tu cuenta en Yumlist Negocios ha sido verificada',
      `¡Hola! Tu perfil en Yumlist Negocios ha sido verificado. Ya puedes acceder a todas las funciones de tu plan. Entra en https://yumlist.app/business/dashboard`
    );
  }

  msg.textContent = '✓ Aprobado correctamente';
  msg.style.color = 'rgb(100,210,140)';

  setTimeout(() => {
    const card = document.getElementById(`doc-${docId}`);
    if (card) { card.style.opacity = '0'; card.style.transition = 'opacity .4s'; setTimeout(() => card.remove(), 400); }
  }, 1500);
}

function toggleReject(docId) {
  document.getElementById(`rf-${docId}`).classList.toggle('open');
}

async function rejectDoc(docId, accountId) {
  const motivo = document.getElementById(`rt-${docId}`).value.trim();
  const msg    = document.getElementById(`rm-${docId}`);

  if (!motivo) { msg.textContent = 'Escribe el motivo antes de confirmar.'; return; }

  msg.textContent = 'Rechazando...';

  const { error: e1 } = await sb.from('business_accounts').update({ status: 'rejected' }).eq('id', accountId);
  const { error: e2 } = await sb.from('business_verification_docs').update({ status: 'rejected' }).eq('id', docId);

  if (e1 || e2) { msg.textContent = 'Error. Revisa la consola.'; console.error(e1, e2); return; }

  const { data: bizData } = await sb.from('business_accounts').select('email').eq('id', accountId).maybeSingle();
  const email = bizData?.email ?? null;

  if (email) {
    await sendEmailNotification(
      email,
      'Tu solicitud de verificación en Yumlist Negocios',
      `Hemos revisado tu solicitud y no ha podido ser aprobada por el siguiente motivo:\n\n${motivo}\n\nSi tienes dudas o quieres enviar documentación adicional, responde a este email.`
    );
  }

  const actionMsg = document.getElementById(`action-msg-${docId}`);
  actionMsg.textContent = '✗ Rechazado. Email enviado.';
  actionMsg.style.color = 'var(--clay)';
  document.getElementById(`rf-${docId}`).classList.remove('open');

  setTimeout(() => {
    const card = document.getElementById(`doc-${docId}`);
    if (card) { card.style.opacity = '0'; card.style.transition = 'opacity .4s'; setTimeout(() => card.remove(), 400); }
  }, 1500);
}

// ── Reports ───────────────────────────────────────────────────────────────────

let allReports = [];
let reportsFilter = 'all';

async function loadReports(filter) {
  reportsFilter = filter;
  const content = document.getElementById('content');

  let query = sb
    .from('reports')
    .select('id, created_at, reason, description, status, reported_post_id, reported_user_id, profiles!reports_reporter_id_fkey(username)')
    .order('created_at', { ascending: false });

  if (filter !== 'all') {
    query = query.eq('status', filter);
  }

  const { data, error } = await query;

  if (error) {
    content.innerHTML = `<div class="alert alert-error">Error al cargar reportes: ${error.message}</div>`;
    return;
  }

  allReports = data ?? [];
  renderReports();
}

function renderReports() {
  const content = document.getElementById('content');

  const filterHTML = `
    <div class="report-filter-row">
      <button class="filter-btn ${reportsFilter === 'all'      ? 'active' : ''}" onclick="loadReports('all')">Todos</button>
      <button class="filter-btn ${reportsFilter === 'pending'  ? 'active' : ''}" onclick="loadReports('pending')">Pendientes</button>
      <button class="filter-btn ${reportsFilter === 'reviewed' ? 'active' : ''}" onclick="loadReports('reviewed')">Revisados</button>
      <button class="filter-btn ${reportsFilter === 'resolved' ? 'active' : ''}" onclick="loadReports('resolved')">Resueltos</button>
      <span class="reports-count">${allReports.length} reporte${allReports.length !== 1 ? 's' : ''}</span>
    </div>`;

  if (allReports.length === 0) {
    content.innerHTML = filterHTML + '<div class="empty">No hay reportes en esta categoría.</div>';
    return;
  }

  const cardsHTML = allReports.map(r => {
    const isPost    = !!r.reported_post_id;
    const typeLabel = isPost ? 'Post' : 'Usuario';
    const typeId    = isPost ? r.reported_post_id : r.reported_user_id;
    const reporter  = r.profiles?.username ?? '—';
    const reason    = REASON_LABELS[r.reason] ?? r.reason ?? '—';
    const badgeClass = r.status === 'resolved' ? 'badge-resolved' : r.status === 'reviewed' ? 'badge-reviewed' : 'badge-pending';
    const statusLabel = r.status === 'resolved' ? 'Resuelto' : r.status === 'reviewed' ? 'Revisado' : 'Pendiente';

    const reviewedDisabled = r.status !== 'pending'  ? 'btn-disabled' : '';
    const resolvedDisabled = r.status === 'resolved' ? 'btn-disabled' : '';

    return `
      <div class="report-card" id="rpt-${r.id}">
        <div class="report-meta">
          <span>${formatDate(r.created_at)}</span>
          <span>Reportado por <strong style="color:rgba(245,240,232,.7)">@${escHtml(reporter)}</strong></span>
          <span class="report-type">${typeLabel}</span>
          ${typeId ? `<span style="font-family:monospace;font-size:11px;opacity:.4">${typeId.slice(0,8)}…</span>` : ''}
        </div>
        <div class="report-reason">${escHtml(reason)}</div>
        ${r.description ? `<div class="report-desc">"${escHtml(r.description)}"</div>` : ''}
        <div class="report-actions">
          <span class="badge ${badgeClass}" id="rpt-badge-${r.id}">${statusLabel}</span>
          <button class="btn-reviewed ${reviewedDisabled}" onclick="setReportStatus('${r.id}', 'reviewed')">Revisado</button>
          <button class="btn-resolved ${resolvedDisabled}" onclick="setReportStatus('${r.id}', 'resolved')">Resolver</button>
          <span class="report-status-msg" id="rpt-msg-${r.id}"></span>
        </div>
      </div>`;
  }).join('');

  content.innerHTML = filterHTML + cardsHTML;
}

async function setReportStatus(reportId, newStatus) {
  const msg = document.getElementById(`rpt-msg-${reportId}`);
  msg.textContent = 'Guardando…';

  const { error } = await sb
    .from('reports')
    .update({ status: newStatus })
    .eq('id', reportId);

  if (error) {
    msg.textContent = 'Error. Inténtalo de nuevo.';
    console.error(error);
    return;
  }

  // Update local data and re-render
  const report = allReports.find(r => r.id === reportId);
  if (report) report.status = newStatus;
  renderReports();
}

// ── Users ─────────────────────────────────────────────────────────────────────

async function loadUsers() {
  const content = document.getElementById('content');

  const [{ data: profiles, error: e1 }, { data: biz, error: e2 }] = await Promise.all([
    sb.from('profiles')
      .select('id, username, name, avatar_url, created_at')
      .order('created_at', { ascending: false }),
    sb.from('business_accounts')
      .select('id, restaurant_name, email, city, status, plan, created_at')
      .order('created_at', { ascending: false }),
  ]);

  if (e1 || e2) {
    content.innerHTML = `<div class="alert alert-error">Error al cargar: ${escHtml((e1 || e2).message)}</div>`;
    return;
  }

  appUsers = profiles ?? [];
  bizAccounts = biz ?? [];
  appUsersPage = 0;
  bizAccountsPage = 0;

  content.innerHTML = `
    <div id="users-app-wrap"></div>
    <div id="users-biz-wrap"></div>
  `;
  renderAppUsersTable();
  renderBizAccountsTable();
}

function renderAppUsersTable() {
  const el = document.getElementById('users-app-wrap');
  if (!el) return;

  const total = appUsers.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  appUsersPage = Math.max(0, Math.min(appUsersPage, totalPages - 1));
  const slice = appUsers.slice(appUsersPage * PAGE_SIZE, (appUsersPage + 1) * PAGE_SIZE);

  el.innerHTML = `
    <div class="users-section-header">
      <h2 class="users-section-title">Usuarios de la app</h2>
      <span class="users-count">${total} usuario${total !== 1 ? 's' : ''}</span>
    </div>
    ${total === 0 ? '<div class="empty">Sin usuarios todavía.</div>' : `
    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:40px"></th>
            <th>Usuario</th>
            <th>Nombre</th>
            <th>Registro</th>
          </tr>
        </thead>
        <tbody>
          ${slice.map(u => `
            <tr>
              <td>${u.avatar_url
                ? `<img src="${escHtml(u.avatar_url)}" class="avatar-sm" alt="">`
                : `<div class="avatar-sm avatar-placeholder">${escHtml((u.name || u.username || '?').charAt(0).toUpperCase())}</div>`}
              </td>
              <td class="cell-username">@${escHtml(u.username ?? '—')}</td>
              <td>${escHtml(u.name ?? '—')}</td>
              <td class="cell-date">${formatDate(u.created_at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    ${totalPages > 1 ? `
    <div class="pagination">
      <button class="pg-btn" onclick="appUsersPage--;renderAppUsersTable()" ${appUsersPage === 0 ? 'disabled' : ''}>← Anterior</button>
      <span class="pg-info">${appUsersPage + 1} / ${totalPages}</span>
      <button class="pg-btn" onclick="appUsersPage++;renderAppUsersTable()" ${appUsersPage >= totalPages - 1 ? 'disabled' : ''}>Siguiente →</button>
    </div>` : ''}
    `}
  `;
}

function renderBizAccountsTable() {
  const el = document.getElementById('users-biz-wrap');
  if (!el) return;

  const total = bizAccounts.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  bizAccountsPage = Math.max(0, Math.min(bizAccountsPage, totalPages - 1));
  const slice = bizAccounts.slice(bizAccountsPage * PAGE_SIZE, (bizAccountsPage + 1) * PAGE_SIZE);

  const statusBadge = s => {
    if (s === 'verified') return '<span class="badge badge-status-verified">Verificado</span>';
    if (s === 'rejected') return '<span class="badge badge-status-rejected">Rechazado</span>';
    return '<span class="badge badge-status-pending">Pendiente</span>';
  };
  const planLabel = p => escHtml({ free: 'Free', pro: 'Pro', premium: 'Premium' }[p] ?? p ?? '—');

  el.innerHTML = `
    <div class="users-section-header">
      <h2 class="users-section-title">Restaurantes registrados</h2>
      <span class="users-count">${total} restaurante${total !== 1 ? 's' : ''}</span>
    </div>
    ${total === 0 ? '<div class="empty">Sin restaurantes todavía.</div>' : `
    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Restaurante</th>
            <th>Email</th>
            <th>Ciudad</th>
            <th>Estado</th>
            <th>Plan</th>
            <th>Registro</th>
          </tr>
        </thead>
        <tbody>
          ${slice.map(b => `
            <tr>
              <td class="cell-restaurant">${escHtml(b.restaurant_name ?? '—')}</td>
              <td class="cell-email">${escHtml(b.email ?? '—')}</td>
              <td>${escHtml(b.city ?? '—')}</td>
              <td>${statusBadge(b.status)}</td>
              <td><span class="badge badge-plan-label">${planLabel(b.plan)}</span></td>
              <td class="cell-date">${formatDate(b.created_at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    ${totalPages > 1 ? `
    <div class="pagination">
      <button class="pg-btn" onclick="bizAccountsPage--;renderBizAccountsTable()" ${bizAccountsPage === 0 ? 'disabled' : ''}>← Anterior</button>
      <span class="pg-info">${bizAccountsPage + 1} / ${totalPages}</span>
      <button class="pg-btn" onclick="bizAccountsPage++;renderBizAccountsTable()" ${bizAccountsPage >= totalPages - 1 ? 'disabled' : ''}>Siguiente →</button>
    </div>` : ''}
    `}
  `;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
