<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — Yumlist Negocios</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230e0d0c' rx='8'/><circle cx='11' cy='16' r='8' fill='%23C4622D'/><circle cx='19' cy='16' r='8' fill='%23F5F0E8' fill-opacity='0.15'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="business.css">
<style>
  .auth-card { max-width: 520px; }
  .auth-page { align-items: flex-start; padding-top: 64px; padding-bottom: 64px; }
</style>
</head>
<body>


<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="/" style="text-decoration:none">
        <svg width="120" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="18" r="10" fill="#C4622D"/>
          <circle cx="19" cy="18" r="10" fill="#F5F0E8" fill-opacity="0.1" stroke="#F5F0E8" stroke-width="0.8"/>
          <text x="34" y="24" font-family="'Cormorant Garamond',Georgia,serif" font-size="22" font-weight="300" letter-spacing="-1" fill="#F5F0E8">yumlist</text>
        </svg>
      </a>
    </div>

    <div class="page-label">Panel de negocios</div>
    <h1 class="auth-title">Crea tu cuenta.</h1>
    <p class="auth-sub">Reclama el perfil de tu restaurante en Yumlist.</p>

    <div id="alert-container"></div>

    <form id="registro-form" novalidate>

      <!-- Acceso -->
      <div class="form-group">
        <label class="form-label" for="email">Email de acceso</label>
        <input class="form-input" type="email" id="email" placeholder="restaurante@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" type="password" id="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
        <div class="form-hint">Mínimo 8 caracteres</div>
      </div>

      <div style="height:8px"></div>

      <!-- Restaurante -->
      <div class="form-group">
        <label class="form-label" for="nombre">Nombre del restaurante</label>
        <input class="form-input" type="text" id="nombre" placeholder="El Rincón de Pepe" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="cif">CIF / NIF</label>
          <input class="form-input" type="text" id="cif" placeholder="B12345678" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="telefono">Teléfono de contacto</label>
          <input class="form-input" type="tel" id="telefono" placeholder="+34 600 000 000" required autocomplete="tel">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="titular">Nombre completo del titular</label>
        <input class="form-input" type="text" id="titular" placeholder="Ana García López" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="ciudad">Ciudad</label>
        <input class="form-input" type="text" id="ciudad" placeholder="Barcelona" required autocomplete="address-level2">
      </div>
      <div class="form-group">
        <label class="form-label" for="direccion">Dirección completa</label>
        <input class="form-input" type="text" id="direccion" placeholder="Carrer de la Diputació 123, 08011" required autocomplete="street-address">
        <div class="geocode-status" id="geocode-status"></div>
      </div>

      <input type="hidden" id="lat">
      <input type="hidden" id="lng">

      <button type="submit" class="btn-primary" id="submit-btn">Crear cuenta</button>
    </form>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="/business/login" class="auth-link">Entra aquí</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="business-auth.js"></script>
<script>
  // Redirect if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.replace('/business/dashboard');
  });

  // Geocoding on address blur
  async function geocodeAddress() {
    const direccion = document.getElementById('direccion').value.trim();
    const ciudad    = document.getElementById('ciudad').value.trim();
    const status    = document.getElementById('geocode-status');

    if (!direccion || !ciudad) return;

    status.textContent = 'Buscando coordenadas...';
    status.className   = 'geocode-status geocode-loading';

    try {
      const q   = encodeURIComponent(`${direccion}, ${ciudad}`);
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1`, {
        headers: { 'Accept-Language': 'es', 'User-Agent': 'YumlistBusiness/1.0' }
      });
      const data = await res.json();

      if (data.length > 0) {
        document.getElementById('lat').value = data[0].lat;
        document.getElementById('lng').value = data[0].lon;
        status.textContent = `✓ Encontrado: ${data[0].display_name.split(',').slice(0, 2).join(',')}`;
        status.className   = 'geocode-status geocode-ok';
      } else {
        document.getElementById('lat').value = '';
        document.getElementById('lng').value = '';
        status.textContent = 'No se encontraron coordenadas — puedes continuar y actualizar la dirección más adelante.';
        status.className   = 'geocode-status geocode-err';
      }
    } catch {
      status.textContent = 'Error al geocodificar — continúa igualmente.';
      status.className   = 'geocode-status geocode-err';
    }
  }

  document.getElementById('direccion').addEventListener('blur', geocodeAddress);
  document.getElementById('ciudad').addEventListener('blur', () => {
    if (document.getElementById('direccion').value.trim()) geocodeAddress();
  });

  // Form submit
  document.getElementById('registro-form').addEventListener('submit', async e => {
    e.preventDefault();
    const alerts = document.getElementById('alert-container');
    const btn    = document.getElementById('submit-btn');
    alerts.innerHTML = '';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const nombre   = document.getElementById('nombre').value.trim();
    const cif      = document.getElementById('cif').value.trim();
    const titular  = document.getElementById('titular').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const ciudad   = document.getElementById('ciudad').value.trim();
    const direccion = document.getElementById('direccion').value.trim();
    const lat      = parseFloat(document.getElementById('lat').value) || null;
    const lng      = parseFloat(document.getElementById('lng').value) || null;

    // Validation
    if (!email || !password || !nombre || !cif || !titular || !telefono || !ciudad || !direccion) {
      alerts.innerHTML = '<div class="alert alert-error">Por favor rellena todos los campos obligatorios.</div>';
      return;
    }
    if (password.length < 8) {
      alerts.innerHTML = '<div class="alert alert-error">La contraseña debe tener al menos 8 caracteres.</div>';
      return;
    }
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRe.test(email)) {
      alerts.innerHTML = '<div class="alert alert-error">El email no tiene un formato válido.</div>';
      return;
    }
    if (!/^[ABCDEFGHJKLMNPQRSUVW]\d{7}[0-9A-J]$/i.test(cif.trim())) {
      alerts.innerHTML = '<div class="alert alert-error">El CIF no tiene un formato válido. Ejemplo: B12345678</div>';
      return;
    }

    btn.textContent = '...';
    btn.disabled    = true;

    // 1. Create auth user
    const { data: authData, error: authError } = await sb.auth.signUp({ email, password });

    if (authError) {
      alerts.innerHTML = `<div class="alert alert-error">${authError.message}</div>`;
      btn.textContent = 'Crear cuenta';
      btn.disabled    = false;
      return;
    }

    const userId = authData.user?.id;
    if (!userId) {
      alerts.innerHTML = '<div class="alert alert-error">No se pudo crear el usuario. Inténtalo de nuevo.</div>';
      btn.textContent = 'Crear cuenta';
      btn.disabled    = false;
      return;
    }

    // 2. Insert business account
    // We use a direct fetch() instead of sb.from().insert() to explicitly control
    // the Authorization header. When email confirmation is enabled in Supabase,
    // signUp() returns session=null and the SDK client has no active JWT — causing
    // the insert to run as 'anon' and fail RLS. By passing the user's access_token
    // directly (when available) we ensure the insert is always authenticated.
    const userSession  = authData.session;
    const accessToken  = userSession?.access_token ?? SUPABASE_KEY;
    const sessionAvail = !!userSession;


    let insertedId = null;
    try {
      const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/business_accounts`, {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        SUPABASE_KEY,
          'Authorization': `Bearer ${accessToken}`,
          'Prefer':        'return=representation'
        },
        body: JSON.stringify({
          id:              userId,
          email:           email,
          restaurant_name: nombre,
          cif:             cif,
          owner_name:      titular,
          phone:           telefono,
          city:            ciudad,
          lat:             lat,
          lng:             lng,
          status:          'pending',
          plan:            'free'
        })
      });

      const insertBody = await insertRes.json();

      if (!insertRes.ok) {
        const errMsg  = insertBody?.message ?? insertBody?.error_description ?? insertBody?.error ?? JSON.stringify(insertBody);
        const errCode = insertBody?.code    ?? insertRes.status;

        const hint = !sessionAvail
          ? `<br><strong>Causa detectada:</strong> la confirmación de email está activa en Supabase.
             El insert se ejecutó como rol <code>anon</code> y la política RLS lo bloqueó.<br>
             <strong>Solución:</strong> en tu panel Supabase → Authentication → Settings → desactiva
             <em>"Enable email confirmations"</em>. O añade la siguiente política RLS:<br>
             <code>CREATE POLICY "insert_own" ON business_accounts FOR INSERT TO authenticated WITH CHECK (auth.uid() = user_id);</code>`
          : `<br>Revisa las políticas RLS de la tabla <code>business_accounts</code> en Supabase.`;

        alerts.innerHTML = `<div class="alert alert-error">
          Tu cuenta de Auth se creó correctamente, pero no pudimos guardar los datos del restaurante.<br>
          <strong>Error: ${errMsg}</strong> (código ${errCode})
          ${hint}
        </div>`;
        btn.textContent = 'Intentar de nuevo';
        btn.disabled    = false;
        return;
      }

      // Success — extract the inserted row's id
      const row = Array.isArray(insertBody) ? insertBody[0] : insertBody;
      insertedId = row?.id ?? null;

    } catch (fetchErr) {
      console.error('[registro] Network error during insert:', fetchErr);
      alerts.innerHTML = `<div class="alert alert-error">Error de red al guardar los datos: ${fetchErr.message}</div>`;
      btn.textContent = 'Intentar de nuevo';
      btn.disabled    = false;
      return;
    }

    // 3. If signUp returned a session, make sure the SDK client uses it
    //    so that the user is authenticated in subsequent pages without having to log in.
    if (userSession) {
      await sb.auth.setSession({
        access_token:  userSession.access_token,
        refresh_token: userSession.refresh_token
      });
    }

    // Store business_id for verificacion.html (fallback when session is delayed)
    if (insertedId) sessionStorage.setItem('biz_id', insertedId);

    window.location.replace('/business/verificacion');
  });

</script>
</body>
</html>
