<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi perfil — Yumlist Negocios</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230e0d0c' rx='8'/><circle cx='11' cy='16' r='8' fill='%23C4622D'/><circle cx='19' cy='16' r='8' fill='%23F5F0E8' fill-opacity='0.15'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="business.css">
<style>
  .profile-form { max-width: 640px; }

  .photos-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .photo-slot {
    width: 120px;
    height: 90px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(245,240,232,.12);
    background: rgba(245,240,232,.04);
    flex-shrink: 0;
  }

  .photo-slot img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-remove {
    position: absolute;
    top: 4px; right: 4px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(14,13,12,.75);
    border: none;
    color: var(--cream);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    line-height: 1;
  }
  .photo-remove:hover { background: rgba(196,98,45,.8); }

  .photo-add {
    width: 120px; height: 90px;
    border-radius: 10px;
    border: 1px dashed rgba(245,240,232,.2);
    background: rgba(245,240,232,.03);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: rgba(245,240,232,.3);
    font-size: 11px;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .photo-add:hover { border-color: rgba(245,240,232,.4); background: rgba(245,240,232,.06); color: rgba(245,240,232,.6); }
  .photo-add input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-add svg { opacity: .5; }

  .char-counter {
    font-size: 11px;
    color: rgba(245,240,232,.3);
    text-align: right;
    margin-top: 4px;
    transition: color .2s;
  }
  .char-counter.warn { color: rgba(220,180,80,.8); }
  .char-counter.over { color: var(--clay); }

  .menu-current {
    font-size: 13px;
    color: rgba(245,240,232,.5);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .menu-current a { color: rgba(245,240,232,.6); text-decoration: none; transition: color .2s; }
  .menu-current a:hover { color: var(--cream); }

  .section-sep {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(245,240,232,.3);
    margin: 28px 0 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(245,240,232,.07);
  }

  .instagram-prefix {
    display: flex;
    align-items: center;
    background: rgba(245,240,232,.05);
    border: 1px solid rgba(245,240,232,.12);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .instagram-prefix:focus-within { border-color: rgba(245,240,232,.35); }
  .instagram-prefix span {
    padding: 12px 0 12px 14px;
    font-size: 14px;
    color: rgba(245,240,232,.35);
    flex-shrink: 0;
  }
  .instagram-prefix .form-input {
    border: none;
    background: transparent;
    border-radius: 0;
    padding-left: 4px;
  }
  .instagram-prefix .form-input:focus { border-color: transparent; }

  /* ── "Ver como visitante" button ─────────────────────────── */
  .btn-visitor {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(245,240,232,.22);
    border-radius: 10px;
    background: transparent;
    color: rgba(245,240,232,.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: border-color .2s, color .2s, background .2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-visitor:hover {
    border-color: rgba(245,240,232,.45);
    color: #F5F0E8;
    background: rgba(245,240,232,.05);
  }

  /* ── Preview modal overlay ───────────────────────────────── */
  #preview-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(14,13,12,.9);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }
  #preview-modal.open { display: flex; }

  #preview-modal-close {
    align-self: center;
    position: relative;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(245,240,232,.18);
    background: rgba(245,240,232,.06);
    color: rgba(245,240,232,.7);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, border-color .2s, color .2s;
    /* Position close button top-right relative to the phone frame */
    margin-bottom: -6px;
    align-self: flex-end;
    /* Offset to align outside the phone */
    margin-right: calc(50vw - 375px/2 - 48px);
  }
  #preview-modal-close:hover {
    background: rgba(245,240,232,.12);
    border-color: rgba(245,240,232,.35);
    color: #F5F0E8;
  }

  /* Phone frame */
  #preview-phone {
    width: 375px;
    max-width: calc(100vw - 32px);
    height: 75vh;
    border-radius: 40px;
    border: 2px solid rgba(245,240,232,.15);
    background: #0e0d0c;
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: none;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,.6);
  }
  #preview-phone::-webkit-scrollbar { display: none; }

  /* Sticky action bar inside phone */
  #preview-actions {
    position: sticky;
    bottom: 0;
    background: #1E1D1B;
    border-top: 1px solid rgba(245,240,232,.08);
    padding: 12px 20px 20px;
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .preview-action-btn {
    flex: 1;
    height: 40px;
    border-radius: 999px;
    border: 1px solid rgba(245,240,232,.3);
    background: transparent;
    color: #F5F0E8;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    gap: 7px;
    cursor: default;
  }
</style>
</head>
<body>
<!-- ── Preview modal ───────────────────────────────────────── -->
<div id="preview-modal" role="dialog" aria-modal="true" aria-label="Vista de visitante">
  <button id="preview-modal-close" onclick="closePreview()" title="Cerrar">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/>
    </svg>
  </button>
  <div id="preview-phone">
    <div id="preview-frame"></div>
    <div id="preview-actions">
      <button class="preview-action-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        Quiero ir
      </button>
      <button class="preview-action-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Cómo llegar
      </button>
    </div>
  </div>
</div>

<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div id="content"><div class="loading">Cargando perfil…</div></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="business-auth.js"></script>
<script>
let bizAccount   = null;
let photoPaths   = [];   // current saved photo paths (from DB)
let newPhotoFiles = [];  // new File objects to upload (max 3 total)
let removePhotos  = [];  // paths to remove

async function init() {
  const session = await requireAuth();
  if (!session) return;

  const account = await getBusinessAccount(session.user.id);
  bizAccount = account;
  document.getElementById('sidebar-mount').innerHTML = buildSidebar(account, '/business/perfil');

  if (!account) {
    document.getElementById('content').innerHTML = `<div class="alert alert-warning">No encontramos tu cuenta de restaurante. <a href="/business/registro" class="auth-link">Completar registro →</a></div>`;
    return;
  }

  // Existing photo paths
  photoPaths = Array.isArray(account.photos) ? [...account.photos] : [];

  renderPage(account);
}

function renderPage(account) {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px;">
      <div>
        <div class="page-label">Configuración</div>
        <h1 class="page-title" style="margin-bottom:0">Mi perfil</h1>
      </div>
      <button class="btn-visitor" onclick="openPreview()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Ver como visitante
      </button>
    </div>

    <div id="alerts"></div>

    <div class="profile-form">

      <!-- Fotos -->
      <div class="section-sep">Fotos del local</div>
      <div id="photos-grid" class="photos-grid"></div>
      <div class="form-hint" style="margin-top:0">Hasta 3 fotos. Se mostrarán en tu perfil público.</div>

      <!-- Descripción -->
      <div class="section-sep">Sobre el restaurante</div>
      <div class="form-group">
        <label class="form-label" for="restaurant_name">Nombre del restaurante</label>
        <input class="form-input" type="text" id="restaurant_name" placeholder="Nombre público del restaurante" value="${esc(account.restaurant_name ?? '')}">
      </div>

      <div class="form-group">
        <label class="form-label" for="descripcion">Descripción</label>
        <textarea class="form-input" id="descripcion" maxlength="300" rows="4"
          placeholder="Cuéntanos qué hace especial a tu restaurante...">${esc(account.description ?? '')}</textarea>
        <div class="char-counter" id="char-count">${(account.description ?? '').length}/300</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="tipo_cocina">Tipo de cocina</label>
          <input class="form-input" type="text" id="tipo_cocina" placeholder="Ej: Italiana, Japonesa, Mediterránea…" value="${esc(account.cuisine_type ?? '')}">
        </div>
        <div class="form-group">
          <label class="form-label" for="horario">Horario</label>
          <input class="form-input" type="text" id="horario" placeholder="Ej: Lun–Vie 13:00–23:00" value="${esc(account.schedule ?? '')}">
        </div>
      </div>

      <!-- Online -->
      <div class="section-sep">Presencia online</div>
      <div class="form-group">
        <label class="form-label" for="reservas_url">Enlace a reservas</label>
        <input class="form-input" type="url" id="reservas_url" placeholder="https://…" value="${esc(account.booking_url ?? '')}">
      </div>
      <div class="form-group">
        <label class="form-label" for="instagram">Instagram</label>
        <div class="instagram-prefix">
          <span>@</span>
          <input class="form-input" type="text" id="instagram" placeholder="nombrerestaurante" value="${esc(account.instagram ?? '')}">
        </div>
      </div>

      <!-- Carta -->
      <div class="section-sep">Carta / Menú</div>
      <div class="form-group">
        <label class="form-label" for="menu_file">Subir carta en PDF</label>
        <input class="form-input" type="file" id="menu_file" accept=".pdf" style="padding:10px 14px;cursor:none">
        ${account.menu_url
          ? `<div class="menu-current">
               <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
               <a href="#" onclick="openMenu(); return false">Ver carta actual</a>
               <button class="btn-sm" onclick="clearMenu()" style="padding:3px 10px;font-size:11px">Eliminar</button>
             </div>`
          : '<div class="form-hint">Ningún PDF subido todavía.</div>'
        }
      </div>

      <div style="margin-top:32px;display:flex;align-items:center;gap:16px">
        <button class="btn-primary" id="save-btn" style="width:auto;padding:13px 36px;margin-top:0" onclick="saveProfile()">Guardar cambios</button>
        <div id="save-status" style="font-size:13px;color:rgba(245,240,232,.4)"></div>
      </div>

    </div>
  `;

  renderPhotos();

  // Char counter
  const desc = document.getElementById('descripcion');
  const counter = document.getElementById('char-count');
  desc.addEventListener('input', () => {
    const len = desc.value.length;
    counter.textContent = `${len}/300`;
    counter.className = 'char-counter' + (len > 280 ? ' warn' : '') + (len >= 300 ? ' over' : '');
  });
  const initLen = desc.value.length;
  counter.textContent = `${initLen}/300`;
  counter.className = 'char-counter' + (initLen > 280 ? ' warn' : '') + (initLen >= 300 ? ' over' : '');
}

function renderPhotos() {
  const grid = document.getElementById('photos-grid');
  if (!grid) return;

  let html = '';

  // Existing saved photos
  photoPaths.forEach((path) => {
    if (removePhotos.includes(path)) return;
    const { data: pubData } = sb.storage.from('business-docs').getPublicUrl(path);
    const url = pubData.publicUrl;
    html += `<div class="photo-slot">
      <img src="${url}" alt="">
      <button class="photo-remove" onclick="removeSavedPhoto('${path}')" title="Eliminar">×</button>
    </div>`;
  });

  // New files (preview)
  newPhotoFiles.forEach((file, i) => {
    const url = URL.createObjectURL(file);
    html += `<div class="photo-slot">
      <img src="${url}" alt="">
      <button class="photo-remove" onclick="removeNewPhoto(${i})" title="Eliminar">×</button>
    </div>`;
  });

  // Add slot (max 3 total)
  const currentCount = photoPaths.filter(p => !removePhotos.includes(p)).length + newPhotoFiles.length;
  if (currentCount < 3) {
    html += `<label class="photo-add" title="Añadir foto">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>Añadir foto</span>
      <input type="file" accept="image/jpeg,image/png,image/webp,image/heic" onchange="addPhoto(event)">
    </label>`;
  }

  grid.innerHTML = html;
}

function removeSavedPhoto(path) {
  if (!removePhotos.includes(path)) removePhotos.push(path);
  renderPhotos();
}

function removeNewPhoto(idx) {
  newPhotoFiles.splice(idx, 1);
  renderPhotos();
}

function addPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) {
    showAlert('La foto supera los 8 MB.', 'error');
    return;
  }
  newPhotoFiles.push(file);
  renderPhotos();
}

async function openMenu() {
  if (!bizAccount?.menu_url) return;
  const { data } = await sb.storage.from('business-docs').createSignedUrl(bizAccount.menu_url, 600);
  if (data?.signedUrl) window.open(data.signedUrl, '_blank');
}

function clearMenu() {
  if (bizAccount) bizAccount.menu_url = null;
  document.querySelector('.menu-current')?.remove();
  document.querySelector('.form-hint')?.remove();
  const hint = document.createElement('div');
  hint.className = 'form-hint';
  hint.textContent = 'Ningún PDF subido todavía.';
  document.getElementById('menu_file').after(hint);
}

async function saveProfile() {
  const btn    = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  const alerts = document.getElementById('alerts');
  alerts.innerHTML = '';
  btn.disabled = true;
  status.textContent = 'Guardando…';

  // 1. Upload new photos
  for (const file of newPhotoFiles) {
    const ext  = file.name.split('.').pop().toLowerCase().replace('heic', 'jpg');
    const path = `${bizAccount.id}/photos/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const { error } = await sb.storage.from('business-docs').upload(path, file, { upsert: false });
    if (error) {
      showAlert(`Error subiendo foto: ${error.message}`, 'error');
      btn.disabled = false;
      status.textContent = '';
      return;
    }
    photoPaths.push(path);
  }
  newPhotoFiles = [];

  // Remove photos from storage (best-effort)
  for (const path of removePhotos) {
    await sb.storage.from('business-docs').remove([path]);
    photoPaths = photoPaths.filter(p => p !== path);
  }
  removePhotos = [];

  // 2. Upload menu PDF if provided
  let menuUrl = bizAccount?.menu_url ?? null;
  const menuFile = document.getElementById('menu_file')?.files?.[0];
  if (menuFile) {
    if (menuFile.size > 20 * 1024 * 1024) {
      showAlert('El PDF supera los 20 MB.', 'error');
      btn.disabled = false;
      status.textContent = '';
      return;
    }
    const menuPath = `${bizAccount.id}/menu.pdf`;
    const { error } = await sb.storage.from('business-docs').upload(menuPath, menuFile, { upsert: true });
    if (error) {
      showAlert(`Error subiendo carta: ${error.message}`, 'error');
      btn.disabled = false;
      status.textContent = '';
      return;
    }
    menuUrl = menuPath;
  }

  // 3. Update business_accounts
  const updates = {
    restaurant_name: document.getElementById('restaurant_name').value.trim() || null,
    photos:          photoPaths.filter(p => !removePhotos.includes(p)),
    description:     document.getElementById('descripcion').value.trim() || null,
    cuisine_type:    document.getElementById('tipo_cocina').value.trim() || null,
    schedule:        document.getElementById('horario').value.trim() || null,
    booking_url:     document.getElementById('reservas_url').value.trim() || null,
    instagram:       document.getElementById('instagram').value.trim().replace(/^@/, '') || null,
    menu_url:        menuUrl,
  };

  const { error: updateError } = await sb
    .from('business_accounts')
    .update(updates)
    .eq('id', bizAccount.id);

  if (updateError) {
    showAlert(`Error al guardar: ${updateError.message}`, 'error');
    btn.disabled = false;
    status.textContent = '';
    return;
  }

  Object.assign(bizAccount, updates);

  btn.disabled    = false;
  status.textContent = '✓ Cambios guardados';
  setTimeout(() => { status.textContent = ''; }, 3000);
  renderPhotos();
}

function showAlert(msg, type) {
  const alerts = document.getElementById('alerts');
  if (!alerts) return;
  alerts.innerHTML = `<div class="alert alert-${type}" style="margin-bottom:20px">${msg}</div>`;
  setTimeout(() => { alerts.innerHTML = ''; }, 4000);
}

// ── Visitor preview ───────────────────────────────────────────

let _previewBlobUrls = [];

function openPreview() {
  // Read current form values
  const name        = document.getElementById('restaurant_name')?.value.trim() || '';
  const description = document.getElementById('descripcion')?.value.trim() || '';
  const cuisine     = document.getElementById('tipo_cocina')?.value.trim() || '';
  const schedule    = document.getElementById('horario')?.value.trim() || '';
  const booking     = document.getElementById('reservas_url')?.value.trim() || '';
  const instagram   = document.getElementById('instagram')?.value.trim().replace(/^@/, '') || '';
  const hasNewMenu  = !!(document.getElementById('menu_file')?.files?.[0]);
  const hasMenu     = hasNewMenu || !!(bizAccount?.menu_url);
  const phone       = bizAccount?.phone || '';

  // First available photo
  _previewBlobUrls.forEach(URL.revokeObjectURL);
  _previewBlobUrls = [];

  let heroUrl = '';
  const activePaths = photoPaths.filter(p => !removePhotos.includes(p));

  if (newPhotoFiles.length > 0) {
    heroUrl = URL.createObjectURL(newPhotoFiles[0]);
    _previewBlobUrls.push(heroUrl);
  } else if (activePaths.length > 0) {
    const { data } = sb.storage.from('business-docs').getPublicUrl(activePaths[0]);
    heroUrl = data.publicUrl;
  }

  document.getElementById('preview-frame').innerHTML = buildPreviewHTML({
    name, description, cuisine, schedule, booking, instagram, hasMenu, phone, heroUrl
  });

  const modal = document.getElementById('preview-modal');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Scroll the phone frame to top
  document.getElementById('preview-phone').scrollTop = 0;
}

function closePreview() {
  document.getElementById('preview-modal').classList.remove('open');
  document.body.style.overflow = '';
  _previewBlobUrls.forEach(URL.revokeObjectURL);
  _previewBlobUrls = [];
}

// Close on backdrop click (not on phone frame)
document.getElementById('preview-modal').addEventListener('click', function(e) {
  if (e.target === this) closePreview();
});

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePreview();
});

function buildPreviewHTML({ name, description, cuisine, schedule, booking, instagram, hasMenu, phone, heroUrl }) {
  const displayName = name || 'Tu restaurante';

  // Hero
  const hero = heroUrl
    ? `<div style="height:200px;background:url('${heroUrl.replace(/'/g, "\\'")}') center/cover no-repeat;flex-shrink:0;"></div>`
    : `<div style="height:200px;background:#1E1D1B;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 24px;">
         <span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;color:#F5F0E8;font-weight:300;text-align:center;line-height:1.2;">${esc(displayName)}</span>
       </div>`;

  // Header
  const header = `
    <div style="padding:20px 20px 16px;">
      <div style="font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#B89F87;margin-bottom:8px;">RESTAURANTE VERIFICADO</div>
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;color:#F5F0E8;font-weight:300;letter-spacing:-0.5px;line-height:1.15;${cuisine ? 'margin-bottom:6px;' : ''}">${esc(displayName)}</div>
      ${cuisine ? `<div style="font-family:'DM Sans',sans-serif;font-size:14px;color:#B89F87;">${esc(cuisine)}</div>` : ''}
    </div>`;

  // Social placeholder
  const social = `
    <div style="margin:0 20px 20px;">
      <div style="background:#1E1D1B;border-radius:16px;padding:20px;">
        <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;color:#F5F0E8;font-weight:300;margin-bottom:8px;">Aún nadie de tu círculo ha estado aquí</div>
        <div style="font-family:'DM Sans',sans-serif;font-size:14px;color:#B89F87;line-height:1.5;">Así se verá cuando tus clientes compartan su experiencia en Yumlist.</div>
      </div>
    </div>`;

  // Info rows
  const rows = [];
  if (cuisine)   rows.push(['TIPO DE COCINA', esc(cuisine)]);
  if (schedule)  rows.push(['HORARIO', esc(schedule)]);
  if (phone)     rows.push(['TELÉFONO', esc(phone)]);
  if (instagram) rows.push(['INSTAGRAM', `@${esc(instagram)}`]);
  if (hasMenu)   rows.push(['CARTA / MENÚ', 'Ver carta']);
  if (booking)   rows.push(['RESERVAS', 'Reservar mesa']);

  const infoSection = (description || rows.length > 0) ? `
    <div style="margin:0 20px;padding-top:20px;border-top:1px solid rgba(245,240,232,.08);">
      <div style="font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#B89F87;margin-bottom:14px;">INFORMACIÓN</div>
      ${description ? `<div style="font-family:'DM Sans',sans-serif;font-size:15px;color:#F5F0E8;line-height:1.6;margin-bottom:${rows.length > 0 ? '4px' : '20px'};">${esc(description)}</div>` : ''}
      ${rows.map(([label, value]) => `
        <div style="padding:13px 0;border-bottom:1px solid rgba(245,240,232,.08);">
          <div style="font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#B89F87;margin-bottom:4px;">${label}</div>
          <div style="font-family:'DM Sans',sans-serif;font-size:15px;color:#F5F0E8;">${value}</div>
        </div>`).join('')}
    </div>` : '';

  // Bottom spacer so content isn't hidden behind sticky bar
  const spacer = `<div style="height:20px;"></div>`;

  return hero + header + social + infoSection + spacer;
}

// Escape HTML special chars for inline content
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

init();
</script>
</body>
</html>
